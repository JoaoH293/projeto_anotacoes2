<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teologia Notes - Mobile</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout Mobile First */
        header { background: var/(--primary); color: var(--accent); padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        
        #sidebar { background: #34495e; color: white; width: 100%; max-height: 200px; overflow-y: auto; padding: 10px; box-sizing: border-box; }
        #editor-area { flex: 1; padding: 15px; background: white; overflow-y: auto; }

        @media (min-width: 768px) {
            .main-container { flex-direction: row; }
            #sidebar { width: 300px; max-height: none; }
        }

        /* UI Elements */
        .auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; width: 100%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--accent); color: var(--primary); border: none; font-weight: bold; cursor: pointer; }
        .nav-btn { background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; cursor: pointer; }
        .tab.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="card">
            <h2 id="auth-title">Entrar no Teologia Notes</h2>
            <div id="cadastro-fields" style="display: none;">
                <input type="text" id="nome" placeholder="Nome Completo">
            </div>
            <input type="email" id="email" placeholder="Seu E-mail">
            <input type="password" id="senha" placeholder="Sua Senha">
            <button id="btn-auth" onclick="authPrincipal()">Entrar</button>
            <p style="text-align: center; font-size: 13px; color: #666; cursor: pointer;" id="toggle-auth" onclick="toggleAuth()">Ainda não tem conta? Cadastre-se</p>
        </div>
    </div>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="welcome-msg" style="font-size: 12px;">Olá!</span>
            <strong>TEOLOGIA NOTES</strong>
            <button onclick="logout()" style="width: auto; padding: 5px 10px; font-size: 10px;">Sair</button>
        </div>
    </header>

    <div class="main-container">
        <aside id="sidebar">
            <div id="historico">Carregando registros...</div>
        </aside>

        <main id="editor-area">
            <div class="tabs">
                <div class="tab active" id="tab-aula" onclick="setMode('aula')">Aula</div>
                <div class="tab" id="tab-sermao" onclick="setMode('sermao')">Sermão</div>
            </div>

            <input type="text" id="titulo" placeholder="Título da Aula / Tema do Sermão">
            <input type="text" id="subtitulo" placeholder="Professor / Referência Bíblica">
            
            <div id="editor" style="height: 300px; margin-top: 10px;"></div>
            
            <button onclick="salvar()" style="margin-top: 20px;">SALVAR NO SISTEMA</button>
            <button onclick="novo()" style="background: #95a5a6;">NOVA ANOTAÇÃO</button>
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        let quill = new Quill('#editor', { theme: 'snow' });
        let isLogin = true;
        let currentMode = 'aula';
        let idAtual = null;

        // --- AUTH LOGIC ---
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Entrar' : 'Criar Conta';
            document.getElementById('cadastro-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('btn-auth').innerText = isLogin ? 'Entrar' : 'Cadastrar';
            document.getElementById('toggle-auth').innerText = isLogin ? 'Ainda não tem conta? Cadastre-se' : 'Já tem conta? Faça Login';
        }

        async function authPrincipal() {
            const path = isLogin ? '/api/auth/login' : '/api/auth/cadastro';
            const body = { 
                email: document.getElementById('email').value, 
                senha: document.getElementById('senha').value,
                nome: document.getElementById('nome').value 
            };

            const res = await fetch(path, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const data = await res.json();

            if (res.ok) {
                if (isLogin) {
                    document.getElementById('auth-screen').style.display = 'none';
                    checarSessao();
                } else {
                    alert("Cadastro realizado! Faça login.");
                    toggleAuth();
                }
            } else { alert(data.erro); }
        }

        async function checarSessao() {
            const res = await fetch('/api/auth/checar');
            const data = await res.json();
            if (data.logado) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('welcome-msg').innerText = `Olá, ${data.nome.split(' ')[0]}!`;
                carregarHistorico();
            }
        }

        async function logout() {
            await fetch('/api/auth/logout');
            location.reload();
        }

        // --- DATA LOGIC ---
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-aula').className = mode === 'aula' ? 'tab active' : 'tab';
            document.getElementById('tab-sermao').className = mode === 'sermao' ? 'tab active' : 'tab';
            document.getElementById('titulo').placeholder = mode === 'aula' ? 'Título da Aula' : 'Tema do Sermão';
            document.getElementById('subtitulo').placeholder = mode === 'aula' ? 'Professor' : 'Texto Bíblico';
        }

        async function salvar() {
            const body = {
                id: idAtual,
                tipo: currentMode,
                titulo: document.getElementById('titulo').value,
                subtitulo: document.getElementById('subtitulo').value,
                conteudo: quill.root.innerHTML
            };
            const res = await fetch('/api/salvar', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            if (res.ok) { alert("Salvo!"); novo(); carregarHistorico(); }
        }

        async function carregarHistorico() {
            const res = await fetch('/api/registros');
            const dados = await res.json();
            const container = document.getElementById('historico');
            container.innerHTML = '<strong>SEUS REGISTROS:</strong><br><br>';
            dados.forEach(reg => {
                const div = document.createElement('div');
                div.className = 'nav-btn';
                div.innerHTML = `<strong>${reg.titulo}</strong><br><small>${reg.tipo}</small>`;
                div.onclick = () => {
                    idAtual = reg.id;
                    setMode(reg.tipo);
                    document.getElementById('titulo').value = reg.titulo;
                    document.getElementById('subtitulo').value = reg.subtitulo;
                    quill.root.innerHTML = reg.conteudo;
                };
                container.appendChild(div);
            });
        }

        function novo() {
            idAtual = null;
            document.getElementById('titulo').value = '';
            document.getElementById('subtitulo').value = '';
            quill.root.innerHTML = '';
        }

        window.onload = checarSessao;
    </script>
</body>
</html>
